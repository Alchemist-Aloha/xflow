name: xflow
description: TikTok-style player for Twitter/X media.
publish_to: 'none'
version: 0.3.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  http: ^1.2.1
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  intl: ^0.20.2

  # Auth & Data Layer from Squawker
  dart_twitter_api: ^0.6.0
  webview_flutter: ^4.13.0
  webview_cookie_manager_plus: ^2.0.17
  sqflite: ^2.3.2
  synchronized: ^3.1.0+1
  logging: ^1.2.0
  ffcache: ^1.1.0
  quiver: ^3.1.0
  crypto: ^3.0.3
  collection: ^1.18.0
  path: ^1.9.1
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  sqflite_common_ffi: ^2.3.2+1
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.svg
